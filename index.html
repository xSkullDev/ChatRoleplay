<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrushOn AI Clone (Responsive & Delete Feature)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="logo" onclick="showView('hub-view')">✨ CrushOn Vanilla</div>
        
        <div class="api-section">
            <input type="password" id="apiKey" placeholder="Masukkan Groq API Key..." autocomplete="off">
        </div>

        <button class="btn-create" onclick="openCreateModal()">+ Buat Karakter</button>

        <div class="sidebar-title">Chat Aktif</div>
        <div class="active-chats" id="activeChatsList">
            </div>
    </aside>

    <main class="main-content">
        
        <section id="hub-view" class="view">
            <div class="view-header">
                <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                <div>
                    <h1>Jelajahi Karakter</h1>
                    <p>Pilih karakter atau buat karaktermu sendiri.</p>
                </div>
            </div>
            <div class="character-grid" id="characterGrid">
                </div>
        </section>

        <section id="chat-view" class="view" style="display: none;">
            <div class="chat-header">
                <button class="back-btn" onclick="showView('hub-view')">←</button>
                
                <div class="chat-profile-trigger" onclick="openEditModal()" title="Klik untuk edit profil">
                    <img id="chatAvatar" src="" alt="Avatar">
                    <div class="chat-bot-info">
                        <h3 id="chatBotName">Nama Bot</h3>
                        <p id="chatBotTitle">Klik untuk Edit 📝</p>
                    </div>
                </div>

                <button class="clear-btn" onclick="clearCurrentChat()">Hapus Chat</button>
            </div>

            <div class="chat-box" id="chatBox">
                </div>

            <div class="loading" id="loadingIndicator">Sedang mengetik...</div>

            <div class="input-area">
                <input type="text" id="userInput" placeholder="Ketik pesan roleplay-mu...">
                <button id="sendBtn">Kirim</button>
            </div>
        </section>
    </main>

    <div id="createModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeCreateModal()">&times;</span>
            <h2>Buat Karakter Baru</h2>
            <div class="form-group">
                <label>Nama Karakter</label>
                <input type="text" id="newBotName" placeholder="Contoh: Hutao">
            </div>
            <div class="form-group">
                <label>URL Gambar Avatar</label>
                <input type="text" id="newBotAvatar" placeholder="https://link-gambar.com/avatar.jpg">
            </div>
            <div class="form-group">
                <label>Pesan Pembuka (Greeting)</label>
                <input type="text" id="newBotGreeting" placeholder="Halo! Ada yang bisa kubantu?">
            </div>
            <div class="form-group">
                <label>Prompt Sistem / Kepribadian</label>
                <textarea id="newBotPrompt" rows="3" placeholder="Kamu adalah..."></textarea>
            </div>
            <button class="btn-submit" onclick="saveNewCharacter()">Buat & Simpan</button>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeEditModal()">&times;</span>
            <h2>Edit Profil Karakter</h2>
            <div class="form-group">
                <label>Nama Karakter</label>
                <input type="text" id="editBotName">
            </div>
            <div class="form-group">
                <label>URL Gambar Avatar</label>
                <input type="text" id="editBotAvatar">
            </div>
            <div class="form-group">
                <label>Pesan Pembuka (Greeting)</label>
                <input type="text" id="editBotGreeting">
            </div>
            <div class="form-group">
                <label>Prompt Sistem / Kepribadian</label>
                <textarea id="editBotPrompt" rows="3"></textarea>
            </div>
            
            <div class="modal-action-buttons">
                <button class="btn-submit" onclick="saveUpdatedCharacter()">Simpan</button>
                <button class="btn-delete" onclick="deleteCurrentCharacter()">Hapus Karakter</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
