<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Roleplay Chat</title>
    <style>
        :root {
            --primary-bg: #f4f4f9;
            --chat-bg: #ffffff;
            --user-msg: #007bff;
            --ai-msg: #e5e5ea;
            --text-dark: #333;
            --text-light: #fff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--chat-bg);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            height: 90vh;
            overflow: hidden;
        }

        .header {
            padding: 20px;
            background: var(--text-dark);
            color: var(--text-light);
            text-align: center;
        }

        .settings {
            padding: 15px;
            background: #eee;
            border-bottom: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .settings input, .settings textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user-message {
            background: var(--user-msg);
            color: var(--text-light);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .ai-message {
            background: var(--ai-msg);
            color: var(--text-dark);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .input-area {
            padding: 15px;
            background: var(--chat-bg);
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 20px;
            outline: none;
        }

        .input-area button {
            padding: 10px 20px;
            background: var(--user-msg);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .input-area button:hover {
            background: #0056b3;
        }

        .loading {
            align-self: flex-start;
            color: #888;
            font-style: italic;
            font-size: 0.9em;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin: 0;">AI Roleplay Chat</h2>
    </div>

    <div class="settings">
        <input type="password" id="apiKey" placeholder="Masukkan Groq API Key Anda di sini..." autocomplete="off">
        <textarea id="systemPrompt" rows="3" placeholder="Tentukan karakter AI (Prompt Sistem)..."></textarea>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message ai-message">Sistem: Silakan masukkan API Key Anda, tentukan peran AI, dan mulai mengobrol!</div>
    </div>
    
    <div class="loading" id="loadingIndicator">Sedang mengetik...</div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ketik pesan Anda..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Kirim</button>
    </div>
</div>

<script>
    // Menyimpan riwayat percakapan untuk konteks LLM
    let chatHistory = [];

    function addMessageToUI(sender, text, isUser) {
        const chatBox = document.getElementById('chatBox');
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message');
        messageDiv.classList.add(isUser ? 'user-message' : 'ai-message');
        messageDiv.textContent = text;
        chatBox.appendChild(messageDiv);
        chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll ke bawah
    }

    async function sendMessage() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const systemPrompt = document.getElementById('systemPrompt').value.trim();
        const userInputBox = document.getElementById('userInput');
        const userMessage = userInputBox.value.trim();
        const loadingIndicator = document.getElementById('loadingIndicator');

        if (!apiKey) {
            alert("Mohon masukkan Groq API Key terlebih dahulu.");
            return;
        }
        if (!userMessage) return;

        // Tampilkan pesan pengguna di UI
        addMessageToUI('Anda', userMessage, true);
        userInputBox.value = '';
        loadingIndicator.style.display = 'block';

        // Susun payload pesan sesuai format OpenAI/Groq API
        const messagesPayload = [
            { role: "system", content: systemPrompt },
            ...chatHistory,
            { role: "user", content: userMessage }
        ];

        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${apiKey}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: "llama-3.1-8b-instant",
                    messages: messagesPayload,
                    temperature: 0.7,
                    max_tokens: 1024
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error?.message || "Terjadi kesalahan pada API.");
            }

            const data = await response.json();
            const aiResponse = data.choices[0].message.content;

            // Simpan ke riwayat agar AI ingat konteks obrolan
            chatHistory.push({ role: "user", content: userMessage });
            chatHistory.push({ role: "assistant", content: aiResponse });

            // Tampilkan balasan AI di UI
            addMessageToUI('AI', aiResponse, false);

        } catch (error) {
            addMessageToUI('Sistem', `Error: ${error.message}`, false);
        } finally {
            loadingIndicator.style.display = 'none';
        }
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }
</script>

</body>
</html>
